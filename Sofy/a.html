<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trending Arrivals</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --rose: #c0324b;
            --rose-lt: #f7e8ec;
            --ink: #1a1a1a;
            --muted: #888;
            --card-bg: #f4f4f2;
            --white: #ffffff;
            --gold: #f5a623;
            --strike: #aaa;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--white);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .trend-section {
            max-width: 1160px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            gap: 0 40px;
        }

        .trend-header {
            grid-column: 1;
            grid-row: 1;
            margin-bottom: 32px;
        }

        .trend-eyebrow {
            font-family: 'Jost', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--rose);
            margin-bottom: 8px;
        }

        .trend-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(30px, 4vw, 48px);
            font-weight: 700;
            line-height: 1.1;
            color: var(--ink);
        }

        .trend-grid {
            grid-column: 1;
            grid-row: 2;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .trend-card {
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .trend-card-img {
            aspect-ratio: 3/3.6;
            overflow: hidden;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .trend-card-img img {
            width: 75%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .trend-card-body {
            padding: 16px 18px 20px;
        }

        .trend-card-store {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .trend-card-name {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .trend-stars {
            display: flex;
            gap: 2px;
            margin-bottom: 10px;
        }

        .trend-star {
            width: 14px;
            height: 14px;
            fill: var(--gold);
        }

        .trend-card-price {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .trend-price-current {
            font-size: 17px;
            font-weight: 600;
            color: var(--ink);
        }

        .trend-price-original {
            font-size: 13px;
            color: var(--strike);
            text-decoration: line-through;
        }

        .trend-banner {
            grid-column: 2;
            grid-row: 1 / 3;
            width: 290px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(160deg, #f9c8d0 0%, #e8829a 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .trend-banner-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        .trend-banner-overlay {
            position: relative;
            z-index: 1;
            padding: 28px 24px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.62) 0%, transparent 100%);
        }

        .trend-banner-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.25;
            margin-bottom: 16px;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .trend-banner-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: var(--white);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            padding: 9px 18px;
            border-radius: 2px;
            text-decoration: none;
            cursor: pointer;
        }

        .trend-banner-btn:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .trend-arrow {
            width: 14px;
            height: 14px;
            stroke: var(--white);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .trend-dots {
            grid-column: 1;
            grid-row: 3;
            display: flex;
            gap: 7px;
            margin-top: 28px;
            align-items: center;
        }

        .trend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d1d1;
        }

        .trend-dot-active {
            background: var(--rose);
        }
    </style>
</head>

<body>

    <section class="trend-section">

        <!-- Header -->
        <div class="trend-header">
            <p class="trend-eyebrow">More to Discover</p>

                        </svg>

                        </svg>

                        </svg>
                        <svg class="trend-star" viewBox="0 0 24 24">
                            <path

                        </svg>
                        <svg class="trend-star" viewBox="0 0 24 24">
                            <path

            <!-- Card 2 -->
            <div class="trend-card">
                <div class="trend-card-img">

                <div class="trend-card-body">
                    <p class="trend-card-store">Shirt, Green</p>
                    <p class="trend-card-name">Strip Shirt For Women (Green)</p>
                    <div class="trend-stars">
                        <svg class="trend-star" viewBox="0 0 24 24">
                            <path
                                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                        </svg>
                        <svg class="trend-star" viewBox="0 0 24 24">
                            <path
                                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                        </svg>
                        <svg class="trend-star" viewBox="0 0 24 24">
                            <path
                                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                        </svg>
                        <svg class="trend-star" viewBox="0 0 24 24">
                            <path
                                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                        </svg>
                        <svg class="trend-star" viewBox="0 0 24 24">
                            <path
                                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                        </svg>
                    </div>
                    <div class="trend-card-price">
                        <span class="trend-price-current">$145.00</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Hero Banner -->
        <div class="trend-banner">
            <img class="trend-banner-img" src="https://images.unsplash.com/photo-1588117305388-c2631a279f82?w=600&q=80"
                alt="Short Sleeve Tunic Tops Casual Swing" />
            <div class="trend-banner-overlay">
                <p class="trend-banner-title">Short Sleeve Tunic Tops Casual Swing</p>
                <a href="#" class="trend-banner-btn">
                    Explore More
                    <svg class="trend-arrow" viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </a>
            </div>
        </div>

        <!-- Pagination dots -->
        <div class="trend-dots">
            <span class="trend-dot trend-dot-active"></span>
            <span class="trend-dot"></span>
            <span class="trend-dot"></span>
        </div>

    </section>

</body>

</html>
